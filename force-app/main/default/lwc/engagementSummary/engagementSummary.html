<template>
    <lightning-card title="Engagement Summary" icon-name="standard:metrics">
        <div class="slds-var-p-around_medium">
            
            <div class="slds-var-m-bottom_medium">
                <p class="slds-text-heading_small">Related Opportunity Amount</p>
                <p class="slds-text-body_regular">
                    <lightning-formatted-number 
                        value={opportunityAmount} 
                        format-style="currency" 
                        currency-code="USD">
                    </lightning-formatted-number>
                </p>
            </div>

            <div class="slds-grid slds-wrap slds-var-m-bottom_medium">
                <div class="slds-col slds-size_1-of-2">
                    <p class="slds-text-heading_small">Completed Tasks</p>
                    <p class="slds-text-body_regular slds-text-color_success">{completedTasks}</p>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <p class="slds-text-heading_small">Upcoming Events</p>
                    <p class="slds-text-body_regular slds-text-color_error">{upcomingEvents}</p>
                </div>
            </div>

            <div class="slds-text-align_center slds-var-m-top_large">
                <lightning-button 
                    label="Quick Follow-Up Call" 
                    variant="brand" 
                    onclick={handleCreateTask}
                    disabled={isCreating}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
